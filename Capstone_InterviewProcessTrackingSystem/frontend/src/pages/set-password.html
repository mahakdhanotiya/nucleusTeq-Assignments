<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set Your Password</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="left-panel">
      <h1>InterviewHub</h1>
      <p>Set your password to complete registration</p>
    </div>
    <div class="right-panel">
      <div class="auth-box">
        <h2>Set Password</h2>
        <p class="subtitle">Create a secure password for your account</p>
        <form id="setPasswordForm">
          <div class="form-group">
            <label>New Password *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
              <span class="toggle-pw" onclick="togglePassword('password')">
                <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </span>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
              <span class="toggle-pw" onclick="togglePassword('confirmPassword')">
                <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </span>
            </div>
          </div>
          <div class="msg" id="setMsg" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Set Password</button>
        </form>
        <div class="auth-footer"><a href="sign-in/index.html">Go to Login</a></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { SITE_CONFIG } from "../scripts/config/site-config.js";

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const msgEl = document.getElementById("setMsg");

    if (!token) {
      msgEl.className = "msg error";
      msgEl.textContent = "Invalid link. No token found.";
      msgEl.style.display = "block";
      document.getElementById("setPasswordForm").querySelector("button").disabled = true;
    }

    document.getElementById("setPasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msgEl.style.display = "none";

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        msgEl.className = "msg error";
        msgEl.textContent = "Passwords do not match";
        msgEl.style.display = "block";
        return;
      }

      try {
        const res = await fetch(SITE_CONFIG.apiUrl + "/auth/set-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (data.success) {
          msgEl.className = "msg success";
          msgEl.textContent = "Password set successfully! Redirecting to login...";
          msgEl.style.display = "block";
          setTimeout(() => window.location.href = "sign-in/index.html", 2000);
        } else {
          msgEl.className = "msg error";
          msgEl.textContent = data.message || "Failed to set password";
          msgEl.style.display = "block";
        }
      } catch (err) {
        msgEl.className = "msg error";
        msgEl.textContent = "Server error. Please try again.";
        msgEl.style.display = "block";
      }
    });
  </script>
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
