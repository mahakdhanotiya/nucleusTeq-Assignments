<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="../../styles/components.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="left-panel">
      <h1>InterviewHub</h1>
      <p>Join us and start your career journey</p>
    </div>
    <div class="right-panel">
      <div style="position: absolute; top: 20px; right: 30px;">
        <a href="../index.html" style="display: inline-flex; align-items: center; color: var(--text-secondary); font-weight: 500; font-size: 0.9rem;">
          <svg style="width: 20px; height: 20px; margin-right: 5px; fill: currentColor;" viewBox="0 0 24 24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
          </svg>
          Back to Home
        </a>
      </div>
      <div class="auth-box">
        <h2>Create Account</h2>
        <p class="subtitle">Create your candidate account</p>
        <form id="registerForm">
          <div class="form-group">
            <label>Full Name *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              <input type="text" id="fullName" placeholder="John Doe" required>
            </div>
            <span class="field-error" id="err-fullName"></span>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <span class="field-error" id="err-email"></span>
          </div>
          <div class="form-group">
            <label>Mobile Number *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
              <input type="tel" id="mobileNumber" placeholder="9876543210" maxlength="10" pattern="[0-9]{10}" required>
            </div>
            <span class="field-error" id="err-mobileNumber"></span>
          </div>
          <div class="form-group">
            <label>Date of Birth</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
              <input type="date" id="dateOfBirth">
            </div>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="gender" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem">
              <option value="">Select Gender</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div class="msg" id="registerMsg" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Create Account</button>
        </form>
        <div class="auth-footer">Already have an account? <a href="../sign-in/index.html">Sign In</a></div>
      </div>
    </div>
  </div>

  <script type="module" src="../../scripts/pages/sign-up.js"></script>
</body>
</html>
