<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Job - InterviewHub</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages/candidate-profile.css">
</head>
<body>
  <div class="apply-container">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4f46e5" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to Jobs
    </a>
    <div class="apply-card">
      <h1 id="applyTitle">Apply for Job</h1>
      <p class="subtitle" id="applySubtitle">Fill out your details below</p>

      <form id="applyForm">
        <h3 class="section-title">Personal Information</h3>
        <div class="form-row">
          <div class="form-group"><label>Full Name *</label><input id="apFullName" required></div>
          <div class="form-group"><label>Email *</label><input id="apEmail" type="email" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Mobile *</label><input id="apMobile" maxlength="10" pattern="[0-9]{10}" required></div>
          <div class="form-group"><label>Date of Birth</label><input id="apDob" type="date"></div>
        </div>
        <div class="form-group"><label>Address</label><input id="apAddress"></div>

        <h3 class="section-title">Professional Details</h3>
        <div class="form-row">
          <div class="form-group"><label>Total Experience (years) *</label><input id="apExp" type="number" min="0" required></div>
          <div class="form-group"><label>Current Company</label><input id="apCompany"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Current CTC (LPA)</label><input id="apCurrentCtc" type="number" step="0.1" min="0"></div>
          <div class="form-group"><label>Expected CTC (LPA)</label><input id="apExpectedCtc" type="number" step="0.1" min="0"></div>
        </div>
        <div class="form-group"><label>Notice Period (days)</label><input id="apNotice" type="number" min="0"></div>

        <h3 class="section-title">Education</h3>
        <div class="form-row">
          <div class="form-group"><label>Degree *</label><input id="apDegree" placeholder="e.g. B.Tech" required></div>
          <div class="form-group"><label>University *</label><input id="apUniv" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Year of Passing *</label><input id="apYop" type="number" min="1990" max="2030" required></div>
          <div class="form-group"><label>Percentage/CGPA</label><input id="apPerc"></div>
        </div>

        <h3 class="section-title">Skills</h3>
        <div class="form-group"><label>Skills (comma separated) *</label><input id="apSkills" placeholder="Java, Spring Boot, React" required></div>

        <div class="msg" id="apMsg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:16px">Submit Application</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { SITE_CONFIG } from "../scripts/config/site-config.js";

    const params = new URLSearchParams(window.location.search);
    const jobId = params.get("jobId");
    const jobTitle = params.get("jobTitle");

    if (jobTitle) {
      document.getElementById("applyTitle").textContent = "Apply: " + decodeURIComponent(jobTitle);
    }

    const token = localStorage.getItem("token");
    if (!token) {
      alert("Please login first to apply");
      window.location.href = "sign-in/index.html";
    }

    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById("apMsg");
      msgEl.style.display = "none";

      const skills = document.getElementById("apSkills").value;
      const body = {
        fullName: document.getElementById("apFullName").value,
        email: document.getElementById("apEmail").value,
        mobileNumber: document.getElementById("apMobile").value,
        dateOfBirth: document.getElementById("apDob").value || null,
        address: document.getElementById("apAddress").value,
        totalExperience: parseInt(document.getElementById("apExp").value || "0"),
        currentCompany: document.getElementById("apCompany").value,
        currentCtc: parseFloat(document.getElementById("apCurrentCtc").value || "0"),
        expectedCtc: parseFloat(document.getElementById("apExpectedCtc").value || "0"),
        noticePeriod: parseInt(document.getElementById("apNotice").value || "0"),
        degree: document.getElementById("apDegree").value,
        university: document.getElementById("apUniv").value,
        yearOfPassing: parseInt(document.getElementById("apYop").value || "0"),
        percentage: document.getElementById("apPerc").value,
        skills: skills ? skills.split(",").map(s => s.trim()) : [],
        jobDescriptionId: jobId ? parseInt(jobId) : null
      };

      try {
        const res = await fetch(SITE_CONFIG.apiUrl + "/candidates", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          msgEl.className = "msg success";
          msgEl.textContent = "Application submitted successfully! Redirecting...";
          msgEl.style.display = "block";
          setTimeout(() => window.location.href = "dashboard.html", 1500);
        } else {
          msgEl.className = "msg error";
          msgEl.textContent = data.message || "Submission failed";
          msgEl.style.display = "block";
        }
      } catch (err) {
        msgEl.className = "msg error";
        msgEl.textContent = "Server error. Please try again.";
        msgEl.style.display = "block";
      }
    });
  </script>
</body>
</html>
