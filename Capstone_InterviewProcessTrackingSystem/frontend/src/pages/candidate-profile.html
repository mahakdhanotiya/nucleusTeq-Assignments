<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Job - InterviewHub</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages/candidate-profile.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-brand"> InterviewHub</div>
      <div class="sidebar-subtitle">Candidate Portal</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard</a></li>
        <li><a href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg> My Interviews</a></li>
        <li><a href="dashboard.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg> Browse Jobs</a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="#" onclick="logout()"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg> Logout</a>
      </div>
    </div>

    <main class="main-content">
      <div class="apply-container" style="max-width: 800px; margin: 0 auto;">
        <div class="apply-card">
          <h1 id="applyTitle">Apply for Job</h1>
          <p class="subtitle" id="applySubtitle">Fill out your details below</p>

          <form id="applyForm">
            <h3 class="section-title">Personal Information</h3>
            <div class="form-row">
              <div class="form-group"><label>Full Name *</label><input id="apFullName" required></div>
              <div class="form-group"><label>Email *</label><input id="apEmail" type="email" required></div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Mobile *</label>
                <input id="apMobile" maxlength="10" pattern="[0-9]{10}" required>
                <span class="field-error" id="err-apMobile"></span>
              </div>
              <div class="form-group">
                <label>Resume (PDF only) *</label>
                <input type="file" id="apResumeFile" accept=".pdf" required>
                <span class="field-error" id="err-apResumeFile"></span>
              </div>
            </div>

            <h3 class="section-title">Professional Details</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Total Experience (years) *</label>
                <input id="apExp" type="number" min="0" required>
                <span class="field-error" id="err-apExp"></span>
              </div>
              <div class="form-group">
                <label>Relevant Experience (years)</label>
                <input id="apRelExp" type="number" min="0">
                <span class="field-error" id="err-apRelExp"></span>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Current Company</label><input id="apCompany"></div>
              <div class="form-group"><label>Preferred Location</label><input id="apLocation"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Current CTC (LPA)</label><input id="apCurrentCtc" type="number" step="0.1" min="0"></div>
              <div class="form-group"><label>Expected CTC (LPA)</label><input id="apExpectedCtc" type="number" step="0.1" min="0"></div>
            </div>
            <div class="form-group"><label>Notice Period (days)</label><input id="apNotice" type="number" min="0"></div>

            <div class="msg" id="apMsg" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:16px">Submit Application</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../scripts/pages/candidate-profile.js"></script>
</body>
</html>
