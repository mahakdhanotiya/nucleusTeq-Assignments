<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterviewHub - Panel Dashboard</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages/panel-dashboard.css">
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sidebar-brand"> InterviewHub</div>
  <div class="sidebar-subtitle">Panel Dashboard</div>
  <ul class="sidebar-nav">
    <li><a href="#" class="active" onclick="showSec('assigned',this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg> Assigned Interviews</a></li>
    <li><a href="#" onclick="showSec('feedback',this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg> Submit Feedback</a></li>
  </ul>
  <div class="sidebar-footer">
    <a href="#" onclick="logout()"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg> Logout</a>
  </div>
</div>

<main class="main-content">
  <div id="sec-assigned">
    <div class="page-header"><h1>My Assigned Interviews</h1></div>
    <div class="card" style="overflow-x:auto">
      <table class="data-table">
        <thead><tr><th>Interview ID</th><th>Candidate</th><th>Job</th><th>Stage</th><th>Date/Time</th><th>Focus Area</th><th>Action</th></tr></thead>
        <tbody id="assignedBody"><tr><td colspan="7" class="empty-state">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="sec-feedback" style="display:none">
    <div class="page-header"><h1>Submit Feedback</h1></div>
    <div class="card">
      <form id="feedbackForm" onsubmit="submitFeedback(event)">
        <div class="form-row">
          <div class="form-group"><label>Interview ID *</label><input id="fbIntId" type="number" readonly class="readonly-input" required></div>
          <div class="form-group"><label>Decision *</label><select id="fbStatus" required><option value="SELECTED">Selected</option><option value="REJECTED">Rejected</option></select></div>
        </div>
        <div class="form-group"><label>Rating (1-5) *</label><input id="fbRating" type="number" min="1" max="5" required placeholder="Enter rating 1-5"></div>
        <div class="form-group"><label>Comments *</label><textarea id="fbComments" rows="3" required placeholder="Overall interview feedback"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Strengths</label><textarea id="fbStrengths" rows="2" placeholder="Key strengths identified"></textarea></div>
          <div class="form-group"><label>Weaknesses</label><textarea id="fbWeaknesses" rows="2" placeholder="Areas for improvement"></textarea></div>
        </div>
        <div class="form-group"><label>Areas Covered</label><input id="fbAreas" placeholder="e.g. Core Java, System Design"></div>
        <button type="submit" class="btn btn-primary btn-full submit-btn">Submit Feedback</button>
        <div class="msg" id="fbMsg" style="display:none"></div>
      </form>
    </div>
  </div>
</main>
</div>
<div class="toast-container" id="toastContainer"></div>
<script type="module" src="../scripts/pages/panel-dashboard.js"></script>
</body>
</html>
