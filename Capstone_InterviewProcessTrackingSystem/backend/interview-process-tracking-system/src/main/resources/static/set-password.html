<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Your Password - InterviewHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #4f46e5; --primary-dark: #4338ca; --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: var(--text); min-height: 100vh; display: flex; }
    .page-wrapper { display: flex; width: 100%; min-height: 100vh; }
    .left-panel { flex: 1; background: linear-gradient(135deg, #4f46e5, #7c3aed); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 40px; }
    .left-panel h1 { font-size: 2rem; margin-bottom: 8px; }
    .left-panel p { opacity: 0.8; font-size: 1rem; }
    .right-panel { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; }
    .auth-box { width: 100%; max-width: 400px; }
    .auth-box h2 { font-size: 1.5rem; margin-bottom: 4px; }
    .auth-box .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 6px; }
    .input-icon-wrapper { position: relative; display: flex; align-items: center; }
    .input-icon-wrapper input { width: 100%; padding: 10px 14px 10px 40px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; transition: 0.2s; }
    .input-icon-wrapper input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: var(--text-secondary); pointer-events: none; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-25%); cursor: pointer; display: flex; align-items: center; }
    .toggle-pw .eye-icon { width: 20px; height: 20px; fill: var(--text-secondary); }
    .toggle-pw:hover .eye-icon { fill: var(--primary); }
    .input-icon-wrapper input[type="password"], .input-icon-wrapper input[type="text"] { padding-right: 40px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
    .msg { padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; }
    .msg.error { background: #fee2e2; color: #dc2626; }
    .msg.success { background: #d1fae5; color: #059669; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-secondary); }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    @media (max-width: 768px) { .left-panel { display: none; } }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="left-panel">
      <h1>InterviewHub</h1>
      <p>Set your password to complete registration</p>
    </div>
    <div class="right-panel">
      <div class="auth-box">
        <h2>Set Password</h2>
        <p class="subtitle">Create a secure password for your account</p>
        <form id="setPasswordForm">
          <div class="form-group">
            <label>New Password *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
              <span class="toggle-pw" onclick="togglePw('password')">
                <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </span>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password *</label>
            <div class="input-icon-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
              <span class="toggle-pw" onclick="togglePw('confirmPassword')">
                <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </span>
            </div>
          </div>
          <div class="msg" id="setMsg" style="display:none"></div>
          <button type="submit" class="btn btn-primary" style="margin-top:8px">Set Password</button>
        </form>
        <div class="auth-footer"><a href="/frontend/src/pages/sign-in/index.html">Go to Login</a></div>
      </div>
    </div>
  </div>

  <script>
    function togglePw(id) { var i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; }

    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var msgEl = document.getElementById('setMsg');

    if (!token) {
      msgEl.className = 'msg error';
      msgEl.textContent = 'Invalid link. No token found in URL.';
      msgEl.style.display = 'block';
      document.querySelector('button').disabled = true;
    }

    document.getElementById('setPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      msgEl.style.display = 'none';

      var password = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Passwords do not match';
        msgEl.style.display = 'block';
        return;
      }

      fetch('/auth/set-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: password })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          msgEl.className = 'msg success';
          msgEl.textContent = 'Password set successfully! Redirecting to login...';
          msgEl.style.display = 'block';
          setTimeout(function() { window.location.href = '/frontend/src/pages/sign-in/index.html'; }, 2000);
        } else {
          msgEl.className = 'msg error';
          msgEl.textContent = data.message || 'Failed to set password';
          msgEl.style.display = 'block';
        }
      })
      .catch(function() {
        msgEl.className = 'msg error';
        msgEl.textContent = 'Server error. Please try again.';
        msgEl.style.display = 'block';
      });
    });
  </script>
</body>
</html>
